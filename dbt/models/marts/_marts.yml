version: 2

models:
  - name: dim_date
    description: Calendar date dimension used for activity reporting and time-based analysis.

    columns:
      - name: date_key
        description: Integer date key in YYYYMMDD format.
        tests:
          - unique
          - not_null

      - name: date_day
        description: Calendar date.
        tests:
          - unique
          - not_null

      - name: year
        description: Calendar year.

      - name: quarter
        description: Calendar quarter.

      - name: month_number
        description: Month number from 1 to 12.

      - name: month_name
        description: Full month name.

      - name: day_name
        description: Full day name.

      - name: is_weekend
        description: Indicates whether the date falls on Saturday or Sunday.

  - name: fct_activities
    description: Fact table containing one row per Strava activity.

    columns:
      - name: activity_id
        description: Unique Strava activity identifier.
        tests:
          - unique
          - not_null

      - name: activity_date_key
        description: Foreign key to dim_date.date_key.
        tests:
          - not_null

      - name: activity_date
        description: Calendar date of the activity.
        tests:
          - not_null

  - name: mart_run_progression
    description: Weekly run progression metrics with rolling pace and heart-rate trends.

    columns:
      - name: week_start_date_key
        description: Integer week key in YYYYMMDD format.
        tests:
          - unique
          - not_null

      - name: week_start_date
        description: Calendar date for the start of the week.
        tests:
          - not_null

      - name: week_end_date
        description: Calendar date for the end of the week.
        tests:
          - not_null

      - name: run_count
        description: Number of runs recorded in the week.
        tests:
          - not_null

      - name: elevation_gain_per_km
        description: Average elevation gain in meters per kilometer for the week.

      - name: terrain_adjusted_pace
        description: Pace adjusted to account for weekly terrain difficulty.

      - name: terrain_adjusted_hr_pace_ratio
        description: Heart-rate-to-pace ratio adjusted for weekly elevation gain.

  - name: mart_weekly_training
    description: Weekly training summary covering all calendar weeks with rolling distance trends.

    columns:
      - name: week_start_date_key
        description: Integer week key in YYYYMMDD format.
        tests:
          - unique
          - not_null

      - name: week_start_date
        description: Calendar date for the start of the week.
        tests:
          - not_null

      - name: week_end_date
        description: Calendar date for the end of the week.
        tests:
          - not_null

      - name: run_count
        description: Number of runs recorded in the week.

      - name: rolling_3wk_distance_km
        description: Three-week rolling average distance in kilometers.

      - name: rolling_7wk_distance_km
        description: Seven-week rolling average distance in kilometers.